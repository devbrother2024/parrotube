name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - name: Check README sync
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          CMD_CHANGED=$(echo "$CHANGED" | grep -E '^src/(commands/|index\.ts)' || true)
          README_CHANGED=$(echo "$CHANGED" | grep '^README.md' || true)
          if [ -n "$CMD_CHANGED" ] && [ -z "$README_CHANGED" ]; then
            echo "::warning::Command files changed but README.md was not updated. Please verify README is in sync."
            echo "Changed command files:"
            echo "$CMD_CHANGED"
          fi
      - name: Check version bump
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          SRC_CHANGED=$(echo "$CHANGED" | grep -E '^src/' || true)
          VER_CHANGED=$(echo "$CHANGED" | grep '^package.json' || true)
          if [ -n "$SRC_CHANGED" ] && [ -z "$VER_CHANGED" ]; then
            echo "::warning::Source files changed but package.json version was not updated. Remember to bump the version for npm publish."
          fi

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view parrotube version --registry https://registry.npmjs.org 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public
